<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}GEO Analyzer{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12/dist/ext/sse.js"></script>
  <style>
    .badge-excellent { @apply bg-green-100 text-green-800; }
    .badge-moderate  { @apply bg-yellow-100 text-yellow-800; }
    .badge-critical  { @apply bg-red-100 text-red-800; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-800">
  <header class="bg-white border-b border-gray-200 shadow-sm">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center gap-3">
      <a href="/" class="text-xl font-bold text-indigo-600 hover:text-indigo-700">
        🔍 GEO Analyzer
      </a>
      <span class="text-gray-400 text-sm">Generative Engine Optimization</span>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-8">
    {% block content %}{% endblock %}
  </main>

  <footer class="max-w-6xl mx-auto px-4 py-6 mt-8 border-t border-gray-200 text-center text-sm text-gray-500">
    Baseado no paper <a href="https://dl.acm.org/doi/abs/10.1145/3637528.3671900" target="_blank" rel="noopener noreferrer" class="underline hover:text-gray-700"><em>"GEO: Generative Engine Optimization"</em> (Aggarwal et al., KDD '24)</a>
  </footer>
</body>
</html>
