{% extends "base.html" %}

{% block title %}Entrar — GEO Analyzer{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
  <div class="text-center mb-8">
    <h1 class="text-2xl font-bold text-gray-900 mb-2">Entrar na sua conta</h1>
    <p class="text-gray-500 text-sm">Acesse seus relatórios de análise GEO</p>
  </div>

  <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8">
    {% if error %}
    <div class="mb-5 bg-red-50 border border-red-200 text-red-700 rounded-xl px-4 py-3 text-sm flex items-center gap-2">
      <span>⚠️</span>
      <span>{{ error }}</span>
    </div>
    {% endif %}

    <form method="post" action="/login" class="space-y-5">
      {% if next %}
      <input type="hidden" name="next" value="{{ next }}" />
      {% endif %}
      <input type="hidden" name="csrf_token" value="{{ csrf_token | default('') }}" />

      <div>
        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">E-mail</label>
        <input
          type="email"
          id="email"
          name="email"
          value="{{ email | default('') }}"
          autocomplete="email"
          required
          autofocus
          class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-indigo-400 text-sm"
          placeholder="seu@email.com"
        />
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
        <input
          type="password"
          id="password"
          name="password"
          autocomplete="current-password"
          required
          class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-indigo-400 text-sm"
          placeholder="••••••••"
        />
      </div>

      <button
        type="submit"
        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-6 rounded-xl transition-colors text-sm"
      >
        Entrar
      </button>
    </form>

    <p class="mt-6 text-center text-sm text-gray-500">
      Não tem conta?
      <a href="/register" class="text-indigo-600 hover:text-indigo-700 font-medium">Cadastre-se gratuitamente</a>
    </p>
  </div>
</div>
{% endblock %}
