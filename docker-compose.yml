services:
  postgres:
    image: postgres:16-alpine
    container_name: geo-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: geoanalyzer
      POSTGRES_PASSWORD: geoanalyzer
      POSTGRES_DB: geoanalyzer
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geoanalyzer"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Puxa o modelo uma única vez após o Ollama estar saudável
  ollama-init:
    image: ollama/ollama:latest
    container_name: ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: "http://ollama:11434"
    entrypoint: ["ollama", "pull", "gemma3:1b"]
    restart: "no"

  mailpit:
    image: axllent/mailpit:latest
    container_name: mailpit
    ports:
      - "8025:8025"   # Web UI
      - "1025:1025"   # SMTP
    restart: unless-stopped

  geo-analyzer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: geo-analyzer
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgres://geoanalyzer:geoanalyzer@postgres:5432/geoanalyzer"
      BIND: "0.0.0.0:3000"
      RUST_LOG: "geo_analyzer=info,tower_http=info"
      OLLAMA_HOST: "http://ollama:11434"
      OLLAMA_MODEL: "gemma3:1b"
      OLLAMA_TIMEOUT_SECS: "120"
      SMTP_HOST: "mailpit"
      SMTP_PORT: "1025"
      SMTP_USER: "test"
      SMTP_PASS: "test"
      SMTP_FROM: "noreply@geo-analyzer.app"
      SMTP_NO_TLS: "true"
      APP_BASE_URL: "http://localhost:3000"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
      mailpit:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
  ollama_data:
